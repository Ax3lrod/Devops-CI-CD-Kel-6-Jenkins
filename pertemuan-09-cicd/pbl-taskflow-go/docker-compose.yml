version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: taskflow-db
    restart: always
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ${IMAGE_TAG:-fikriau/taskflow-api:stable}
    container_name: taskflow-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://taskflow:taskflow_secret@postgres:5432/taskflow?sslmode=disable
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: